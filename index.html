<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Love</title>
  <style>
    :root{
      --bg1:#140014;
      --bg2:#32002f;
      --heart:#ff4d88;
      --glow:#ff9ec4;
      --text:#fff0f7;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      overflow:hidden;
      font-family:"Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top, #4d003f 0%, transparent 35%),
        radial-gradient(circle at bottom, #240022 0%, transparent 30%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
    }
    .wrap{
      position:relative;
      width:min(90vw, 700px);
      aspect-ratio:1/1;
      display:grid;
      place-items:center;
    }
    svg{
      width:100%;
      height:100%;
      overflow:visible;
      filter: drop-shadow(0 0 10px rgba(255, 77, 136, 0.25))
              drop-shadow(0 0 22px rgba(255, 158, 196, 0.18));
    }
    .heart-path{
      fill:none;
      stroke:var(--heart);
      stroke-width:10;
      stroke-linecap:round;
      stroke-linejoin:round;
      stroke-dasharray:1600;
      stroke-dashoffset:1600;
      animation: drawHeart 4.2s ease-in-out forwards;
    }
    .heart-glow{
      fill:rgba(255, 77, 136, 0.08);
      opacity:0;
      animation: softFill 1.5s ease forwards 3.2s;
    }
    .text{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      text-align:center;
      color:var(--text);
      font-size:clamp(2rem, 5vw, 4.4rem);
      font-weight:700;
      letter-spacing:0.06em;
      text-shadow:
        0 0 10px rgba(255,255,255,0.28),
        0 0 24px rgba(255,158,196,0.35);
      opacity:0;
      transform:scale(.8);
      animation:textIn 1.2s ease forwards 4.1s;
      user-select:none;
    }
    .sparkle{
      position:absolute;
      width:8px;
      height:8px;
      border-radius:50%;
      background:#ffd7e8;
      box-shadow:0 0 10px #ffd7e8, 0 0 20px #ff8db6;
      opacity:0;
      animation: twinkle 2.5s linear infinite;
    }
    .s1{ top:16%; left:18%; animation-delay:.2s; }
    .s2{ top:24%; right:16%; animation-delay:1.2s; }
    .s3{ bottom:24%; left:14%; animation-delay:.8s; }
    .s4{ bottom:18%; right:18%; animation-delay:1.8s; }
    .s5{ top:8%; left:48%; animation-delay:1.5s; }

    @keyframes drawHeart{
      from{ stroke-dashoffset:1600; }
      to{ stroke-dashoffset:0; }
    }
    @keyframes softFill{
      from{ opacity:0; }
      to{ opacity:1; }
    }
    @keyframes textIn{
      0%{ opacity:0; transform:scale(.8); filter:blur(6px); }
      100%{ opacity:1; transform:scale(1); filter:blur(0); }
    }
    @keyframes twinkle{
      0%,100%{ opacity:0; transform:scale(.5); }
      40%{ opacity:1; transform:scale(1.4); }
      60%{ opacity:.6; transform:scale(1); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <svg viewBox="0 0 600 600" aria-label="Animated heart">
      <path class="heart-glow"
        d="M300 510
           C 235 455, 85 340, 85 210
           C 85 125, 150 80, 215 80
           C 260 80, 290 103, 300 140
           C 310 103, 340 80, 385 80
           C 450 80, 515 125, 515 210
           C 515 340, 365 455, 300 510 Z" />
      <path class="heart-path"
        d="M300 510
           C 235 455, 85 340, 85 210
           C 85 125, 150 80, 215 80
           C 260 80, 290 103, 300 140
           C 310 103, 340 80, 385 80
           C 450 80, 515 125, 515 210
           C 515 340, 365 455, 300 510 Z" />
    </svg>
    <div class="text">My Love</div>
    <span class="sparkle s1"></span>
    <span class="sparkle s2"></span>
    <span class="sparkle s3"></span>
    <span class="sparkle s4"></span>
    <span class="sparkle s5"></span>
  </div>
</body>
</html>
